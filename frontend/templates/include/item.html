{{define "item"}}<div class="download" style="--bg: url('https://data.gmods.org/{{.ID}}/1/570x180.jpg');">
	<div class="banner">
		{{if .Uploader.Valid}}<div class="author">By <a class="username" href="#">{{.Uploader.String}}</a></div>{{end}}
		<a href="/view/{{.ID}}" class="biglink">{{.PrettyName}}</a>
		<div class="dlmeta">{{.PrettySize}}{{if .Uploaded.Valid}}, {{timeago .Uploaded.Time}}{{end}}, {{.Downloads}} downloads</div>
	</div>
	<a class="clickzone" href="/view/{{.ID}}"></a>
</div>{{end}}
